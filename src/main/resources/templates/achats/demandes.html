<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Demandes d'achat</title>
</head>
<body>
<div layout:fragment="content">
    <div class="page-header d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1>Demandes d'achat</h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/dashboard}">Accueil</a></li>
                    <li class="breadcrumb-item active">Demandes d'achat</li>
                </ol>
            </nav>
        </div>
        <a th:href="@{/achats/demandes/add}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-2"></i>Nouvelle demande
        </a>
    </div>
    
    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Numéro</th>
                            <th>Date</th>
                            <th>Site</th>
                            <th>Demandeur</th>
                            <th>Objet</th>
                            <th>Montant HT</th>
                            <th>Statut</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="demande : ${demandes.content}">
                            <td>
                                <a th:href="@{/achats/demandes/{id}(id=${demande.id})}" th:text="${demande.numero}"></a>
                            </td>
                            <td th:text="${#temporals.format(demande.createdAt, 'dd/MM/yyyy')}"></td>
                            <td th:text="${demande.site?.name}"></td>
                            <td th:text="${demande.demandeur?.username}"></td>
                            <td th:text="${#numbers.formatDecimal(0, 0, 'COMMA', 0, 'POINT')}"></td>
                            <td th:text="${#numbers.formatDecimal(0, 0, 'COMMA', 0, 'POINT')}"></td>
                            <td>
                                <span class="badge badge-status" 
                                      th:classappend="'badge-' + ${demande.statutCode?.toLowerCase()}"
                                      th:text="${demande.statutCode}"></span>
                            </td>
                            <td>
                                <div class="btn-group btn-group-sm">
                                    <a th:href="@{/achats/demandes/{id}(id=${demande.id})}" class="btn btn-outline-primary" title="Voir">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${demandes.content.isEmpty()}">
                            <td colspan="8" class="text-center text-muted py-4">
                                <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                                Aucune demande d'achat
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <!-- Pagination -->
            <nav th:if="${demandes.totalPages > 1}" class="mt-4">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${demandes.first} ? 'disabled'">
                        <a class="page-link" th:href="@{/achats/demandes(page=${demandes.number - 1})}">Précédent</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, demandes.totalPages - 1)}"
                        th:classappend="${i == demandes.number} ? 'active'">
                        <a class="page-link" th:href="@{/achats/demandes(page=${i})}" th:text="${i + 1}"></a>
                    </li>
                    <li class="page-item" th:classappend="${demandes.last} ? 'disabled'">
                        <a class="page-link" th:href="@{/achats/demandes(page=${demandes.number + 1})}">Suivant</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>
</body>
</html>
