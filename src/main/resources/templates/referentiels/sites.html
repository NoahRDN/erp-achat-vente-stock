<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Gestion des Sites</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        .site-map {
            height: 400px;
            border-radius: 12px;
            margin-bottom: 1.5rem;
        }
        .location-picker-map {
            height: 300px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="page-header d-flex justify-content-between align-items-center">
        <div>
            <h1><i class="bi bi-building me-2"></i>Gestion des Sites</h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/}">Accueil</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/referentiels}">Référentiels</a></li>
                    <li class="breadcrumb-item active">Sites</li>
                </ol>
            </nav>
        </div>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addSiteModal">
            <i class="bi bi-plus-lg me-1"></i>Nouveau Site
        </button>
    </div>

    <!-- Carte des sites -->
    <div class="card mb-4">
        <div class="card-header">
            <h5 class="mb-0"><i class="bi bi-geo-alt me-2"></i>Carte des Sites</h5>
        </div>
        <div class="card-body p-0">
            <div id="sitesMap" class="site-map"></div>
        </div>
    </div>

    <!-- Tableau des sites -->
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Liste des Sites</h5>
            <div class="input-group" style="width: 300px;">
                <span class="input-group-text"><i class="bi bi-search"></i></span>
                <input type="text" class="form-control" placeholder="Rechercher..." id="searchSite">
            </div>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover" id="sitesTable">
                    <thead>
                        <tr>
                            <th>Code</th>
                            <th>Nom</th>
                            <th>Adresse</th>
                            <th>Coordonnées</th>
                            <th>Statut</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="site : ${sites}" th:data-lat="${site.latitude}" th:data-lng="${site.longitude}">
                            <td th:text="${site.code}"></td>
                            <td>
                                <strong th:text="${site.name}"></strong>
                            </td>
                            <td th:text="${site.address}"></td>
                            <td>
                                <span th:if="${site.latitude != null && site.longitude != null}" class="badge bg-success">
                                    <i class="bi bi-geo-alt"></i>
                                    <span th:text="${#numbers.formatDecimal(site.latitude, 1, 4)}"></span>,
                                    <span th:text="${#numbers.formatDecimal(site.longitude, 1, 4)}"></span>
                                </span>
                                <span th:unless="${site.latitude != null && site.longitude != null}" class="badge bg-secondary">
                                    Non géolocalisé
                                </span>
                            </td>
                            <td>
                                <span th:if="${site.isActive}" class="badge bg-success">Actif</span>
                                <span th:unless="${site.isActive}" class="badge bg-danger">Inactif</span>
                            </td>
                            <td>
                                <div class="btn-group btn-group-sm">
                                    <button class="btn btn-outline-primary" th:onclick="'focusSite(' + ${site.latitude} + ',' + ${site.longitude} + ')'" title="Voir sur la carte">
                                        <i class="bi bi-geo-alt"></i>
                                    </button>
                                    <button class="btn btn-outline-secondary" th:onclick="'editSite(\'' + ${site.id} + '\')'" title="Modifier">
                                        <i class="bi bi-pencil"></i>
                                    </button>
                                    <button class="btn btn-outline-danger" th:onclick="'deleteSite(\'' + ${site.id} + '\')'" title="Supprimer">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Ajout Site -->
    <div class="modal fade" id="addSiteModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-building me-2"></i>Nouveau Site</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/referentiels/sites}" method="post">
                    <div class="modal-body">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Code *</label>
                                    <input type="text" class="form-control" name="code" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Nom *</label>
                                    <input type="text" class="form-control" name="name" required>
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Adresse</label>
                            <textarea class="form-control" name="address" rows="2"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Société</label>
                            <select class="form-select" name="societeId" required>
                                <option value="" selected disabled>Sélectionner une société</option>
                                <option th:each="societe : ${societes}" th:value="${societe.id}" th:text="${societe.name}"></option>
                            </select>
                        </div>
                        
                        <!-- Sélection de la localisation sur la carte -->
                        <div class="mb-3">
                            <label class="form-label"><i class="bi bi-geo-alt me-1"></i>Localisation (cliquez sur la carte)</label>
                            <div id="locationPickerMap" class="location-picker-map mb-2"></div>
                            <div class="row">
                                <div class="col-6">
                                    <input type="number" step="0.0000001" class="form-control" name="latitude" id="inputLatitude" placeholder="Latitude">
                                </div>
                                <div class="col-6">
                                    <input type="number" step="0.0000001" class="form-control" name="longitude" id="inputLongitude" placeholder="Longitude">
                                </div>
                            </div>
                        </div>
                        
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="isActive" checked>
                            <label class="form-check-label">Site actif</label>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-1"></i>Enregistrer
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script th:inline="javascript">
        // Carte principale des sites
        const sitesMap = L.map('sitesMap').setView([-18.8792, 47.5079], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(sitesMap);

        // Icône personnalisée pour les sites
        const siteIcon = L.divIcon({
            className: 'custom-marker',
            html: '<div style="background-color: #3b82f6; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 2px 6px rgba(0,0,0,0.3); font-size: 18px;"><i class="bi bi-building"></i></div>',
            iconSize: [36, 36],
            iconAnchor: [18, 18],
            popupAnchor: [0, -18]
        });

        // Charger les sites depuis l'API
        fetch('/api/geo/sites')
            .then(response => response.json())
            .then(sites => {
                const markers = [];
                sites.forEach(site => {
                    const marker = L.marker([site.latitude, site.longitude], { icon: siteIcon })
                        .bindPopup(site.popupContent)
                        .addTo(sitesMap);
                    markers.push(marker.getLatLng());
                });
                if (markers.length > 0) {
                    sitesMap.fitBounds(L.latLngBounds(markers), { padding: [50, 50] });
                }
            });

        // Focus sur un site
        function focusSite(lat, lng) {
            if (lat && lng) {
                sitesMap.setView([lat, lng], 15);
            }
        }

        // Carte pour le picker de localisation dans le modal
        let pickerMap = null;
        let pickerMarker = null;

        document.getElementById('addSiteModal').addEventListener('shown.bs.modal', function () {
            if (!pickerMap) {
                pickerMap = L.map('locationPickerMap').setView([-18.8792, 47.5079], 6);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap'
                }).addTo(pickerMap);

                // Ajouter le marqueur au clic
                pickerMap.on('click', function(e) {
                    const lat = e.latlng.lat;
                    const lng = e.latlng.lng;
                    
                    document.getElementById('inputLatitude').value = lat.toFixed(7);
                    document.getElementById('inputLongitude').value = lng.toFixed(7);
                    
                    if (pickerMarker) {
                        pickerMarker.setLatLng(e.latlng);
                    } else {
                        pickerMarker = L.marker(e.latlng, { icon: siteIcon }).addTo(pickerMap);
                    }
                });
            }
            setTimeout(() => pickerMap.invalidateSize(), 100);
        });

        // Recherche dans le tableau
        document.getElementById('searchSite').addEventListener('input', function() {
            const search = this.value.toLowerCase();
            document.querySelectorAll('#sitesTable tbody tr').forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(search) ? '' : 'none';
            });
        });

        function editSite(id) {
            window.location.href = '/referentiels/sites/' + id + '/edit';
        }

        function deleteSite(id) {
            if (confirm('Êtes-vous sûr de vouloir supprimer ce site ?')) {
                fetch('/referentiels/sites/' + id, { method: 'DELETE' })
                    .then(() => location.reload());
            }
        }
    </script>
</th:block>
</body>
</html>
