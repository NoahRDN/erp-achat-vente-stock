<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Ajouter un Produit</title>
</head>
<body>
    <h1>Ajouter un Produit</h1>
    <form th:action="@{/products}" th:object="${product}" method="post">
        <label for="name">Nom:</label>
        <input type="text" th:field="*{name}" id="name" required><br>

        <label for="description">Description:</label>
        <textarea th:field="*{description}" id="description"></textarea><br>

        <label for="price">Prix:</label>
        <input type="number" step="0.01" th:field="*{price}" id="price" required><br>

        <label for="quantity">Quantité:</label>
        <input type="number" th:field="*{quantity}" id="quantity" required><br>

        <button type="submit">Sauvegarder</button>
    </form>
    <a href="/products">Retour à la liste</a>
</body>
</html>
