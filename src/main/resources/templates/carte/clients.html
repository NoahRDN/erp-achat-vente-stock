<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Carte des Clients</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #mainMap {
            height: calc(100vh - 200px);
            min-height: 500px;
            border-radius: 12px;
        }
        .client-panel {
            max-height: calc(100vh - 200px);
            overflow-y: auto;
        }
        .client-item {
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }
        .client-item:hover {
            background-color: #fffbeb;
            border-left-color: #f59e0b;
        }
        .client-item.active {
            background-color: #fef3c7;
            border-left-color: #f59e0b;
        }
        .client-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="page-header d-flex justify-content-between align-items-center">
        <div>
            <h1><i class="bi bi-people me-2"></i>Carte des Clients</h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/}">Accueil</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/carte}">Cartographie</a></li>
                    <li class="breadcrumb-item active">Clients</li>
                </ol>
            </nav>
        </div>
        <div class="btn-group">
            <a th:href="@{/ventes/clients}" class="btn btn-outline-warning">
                <i class="bi bi-list me-1"></i>Vue liste
            </a>
            <button class="btn btn-warning" onclick="fitAllMarkers()">
                <i class="bi bi-arrows-fullscreen me-1"></i>Tout afficher
            </button>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-8 mb-4">
            <div class="card h-100">
                <div class="card-body p-0">
                    <div id="mainMap"></div>
                </div>
            </div>
        </div>
        <div class="col-lg-4 mb-4">
            <div class="card h-100">
                <div class="card-header">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-0"><i class="bi bi-search"></i></span>
                        <input type="text" class="form-control border-0" placeholder="Rechercher un client..." id="searchInput">
                    </div>
                </div>
                <div class="card-body p-0 client-panel">
                    <div class="list-group list-group-flush">
                        <div th:each="client : ${clients}" 
                             class="list-group-item client-item"
                             th:data-lat="${client.latitude}"
                             th:data-lng="${client.longitude}"
                             th:data-id="${client.id}"
                             th:onclick="${client.latitude != null && client.longitude != null} ? 'focusOnClient(' + ${client.latitude} + ',' + ${client.longitude} + ', this)' : 'alertNoCoords()'">
                            <div class="d-flex align-items-center">
                                <div class="client-avatar me-3">
                                    <span th:text="${#strings.substring(client.name, 0, 1)}">C</span>
                                </div>
                                <div class="flex-grow-1">
                                    <h6 class="mb-0" th:text="${client.name}">Nom du client</h6>
                                    <small class="text-muted" th:text="${client.code}">CODE</small>
                                    <div th:if="${client.adresse}" class="mt-1">
                                        <small class="text-muted">
                                            <i class="bi bi-geo me-1"></i>
                                            <span th:text="${#strings.abbreviate(client.adresse, 30)}"></span>
                                        </small>
                                    </div>
                                </div>
                                <div class="text-end">
                                    <span th:if="${client.latitude != null}" class="badge bg-success">
                                        <i class="bi bi-geo-alt-fill"></i>
                                    </span>
                                    <span th:unless="${client.latitude != null}" class="badge bg-secondary">
                                        <i class="bi bi-geo-alt"></i>
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('mainMap').setView([-18.8792, 47.5079], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        const clientIcon = L.divIcon({
            className: 'custom-marker',
            html: '<div style="background-color: #f59e0b; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 3px 10px rgba(0,0,0,0.3); font-size: 16px; border: 3px solid white;"><i class="bi bi-person-fill"></i></div>',
            iconSize: [32, 32],
            iconAnchor: [16, 16],
            popupAnchor: [0, -18]
        });

        let markers = [];

        // Charger les clients via l'API
        fetch('/api/geo/clients')
            .then(response => response.json())
            .then(clients => {
                clients.forEach(client => {
                    const marker = L.marker([client.latitude, client.longitude], { icon: clientIcon })
                        .bindPopup(client.popupContent)
                        .addTo(map);
                    markers.push(marker);
                });
                if (markers.length > 0) {
                    fitAllMarkers();
                }
            });

        function fitAllMarkers() {
            if (markers.length > 0) {
                const group = L.featureGroup(markers);
                map.fitBounds(group.getBounds(), { padding: [50, 50] });
            }
        }

        function focusOnClient(lat, lng, element) {
            if (lat && lng) {
                map.setView([lat, lng], 15);
                document.querySelectorAll('.client-item').forEach(el => el.classList.remove('active'));
                element.classList.add('active');
            }
        }

        function alertNoCoords() {
            alert('Ce client n\'a pas de coordonnées GPS définies.');
        }

        document.getElementById('searchInput').addEventListener('input', function() {
            const search = this.value.toLowerCase();
            document.querySelectorAll('.client-item').forEach(item => {
                const text = item.textContent.toLowerCase();
                item.style.display = text.includes(search) ? '' : 'none';
            });
        });
    </script>
</th:block>
</body>
</html>
