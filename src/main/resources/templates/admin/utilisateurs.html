<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Utilisateurs</title>
</head>
<body>
<div layout:fragment="content">
    <div class="page-header d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1>Gestion des utilisateurs</h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/dashboard}">Accueil</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/admin}">Administration</a></li>
                    <li class="breadcrumb-item active">Utilisateurs</li>
                </ol>
            </nav>
        </div>
        <a th:href="@{/admin/utilisateurs/add}" class="btn btn-primary">
            <i class="bi bi-person-plus me-2"></i>Nouvel utilisateur
        </a>
    </div>
    
    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Utilisateur</th>
                            <th>Login</th>
                            <th>Email</th>
                            <th>Rôle</th>
                            <th>Département</th>
                            <th>Site</th>
                            <th>Statut</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="utilisateur : ${utilisateurs.content}">
                            <td>
                                <div class="d-flex align-items-center">
                                    <div class="user-avatar me-2" th:text="${#strings.substring(utilisateur.username, 0, 1).toUpperCase()}">U</div>
                                    <div>
                                        <div th:text="${utilisateur.username}"></div>
                                    </div>
                                </div>
                            </td>
                            <td><code th:text="${utilisateur.username}"></code></td>
                            <td th:text="${utilisateur.email}"></td>
                            <td>
                                <span th:each="role : ${utilisateur.roles}" class="badge bg-primary me-1" th:text="${role.label}"></span>
                            </td>
                            <td th:text="${utilisateur.departement?.name}"></td>
                            <td>-</td>
                            <td>
                                <span class="badge" th:classappend="${utilisateur.isActive} ? 'bg-success' : 'bg-secondary'"
                                      th:text="${utilisateur.isActive} ? 'Actif' : 'Inactif'"></span>
                            </td>
                            <td>
                                <div class="btn-group btn-group-sm">
                                    <a th:href="@{/admin/utilisateurs/{id}(id=${utilisateur.id})}" class="btn btn-outline-primary" title="Voir">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                    <a th:href="@{/admin/utilisateurs/{id}/edit(id=${utilisateur.id})}" class="btn btn-outline-secondary" title="Modifier">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <form th:action="@{/admin/utilisateurs/{id}/toggle(id=${utilisateur.id})}" method="post" class="d-inline">
                                        <button type="submit" class="btn btn-outline-warning" 
                                                th:title="${utilisateur.isActive} ? 'Désactiver' : 'Activer'">
                                            <i class="bi" th:classappend="${utilisateur.isActive} ? 'bi-toggle-on' : 'bi-toggle-off'"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <!-- Pagination -->
            <nav th:if="${utilisateurs.totalPages > 1}" class="mt-4">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${utilisateurs.first} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/utilisateurs(page=${utilisateurs.number - 1})}">Précédent</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, utilisateurs.totalPages - 1)}"
                        th:classappend="${i == utilisateurs.number} ? 'active'">
                        <a class="page-link" th:href="@{/admin/utilisateurs(page=${i})}" th:text="${i + 1}"></a>
                    </li>
                    <li class="page-item" th:classappend="${utilisateurs.last} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/utilisateurs(page=${utilisateurs.number + 1})}">Suivant</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>
</body>
</html>
