<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Inventaires</title>
</head>
<body>
<div layout:fragment="content">
    <div class="page-header d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1>Inventaires</h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/dashboard}">Accueil</a></li>
                    <li class="breadcrumb-item active">Inventaires</li>
                </ol>
            </nav>
        </div>
        <a th:href="@{/inventaires/add}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-2"></i>Nouvel inventaire
        </a>
    </div>
    
    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Numéro</th>
                            <th>Type</th>
                            <th>Dépôt</th>
                            <th>Date début</th>
                            <th>Date clôture</th>
                            <th>Créé par</th>
                            <th>Statut</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="inventaire : ${inventaires.content}">
                            <td>
                                <a th:href="@{/inventaires/{id}(id=${inventaire.id})}" th:text="${inventaire.numero}"></a>
                            </td>
                            <td th:text="${inventaire.typeCode}"></td>
                            <td th:text="${inventaire.depot?.name}"></td>
                            <td th:text="${inventaire.dateDebut != null ? #temporals.format(inventaire.dateDebut, 'dd/MM/yyyy') : '-'}"></td>
                            <td th:text="${inventaire.dateCloture != null ? #temporals.format(inventaire.dateCloture, 'dd/MM/yyyy') : '-'}"></td>
                            <td th:text="${inventaire.creePar?.username}"></td>
                            <td>
                                <span class="badge" 
                                      th:classappend="${inventaire.statutCode == 'PLANIFIE'} ? 'bg-secondary' : 
                                                     (${inventaire.statutCode == 'EN_COURS'} ? 'bg-warning' : 
                                                     (${inventaire.statutCode == 'ANALYSE'} ? 'bg-info' : 'bg-success'))"
                                      th:text="${inventaire.statutCode}"></span>
                            </td>
                            <td>
                                <div class="btn-group btn-group-sm">
                                    <a th:href="@{/inventaires/{id}(id=${inventaire.id})}" class="btn btn-outline-primary" title="Voir">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${inventaires.content.isEmpty()}">
                            <td colspan="8" class="text-center text-muted py-4">
                                <i class="bi bi-clipboard-check fs-1 d-block mb-2"></i>
                                Aucun inventaire
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
