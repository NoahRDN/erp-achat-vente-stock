<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Fournisseurs</title>
</head>
<body>
<div layout:fragment="content">
    <div class="page-header d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1>Gestion Fournisseurs</h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/dashboard}">Accueil</a></li>
                    <li class="breadcrumb-item active">Fournisseurs</li>
                </ol>
            </nav>
        </div>
        <a th:href="@{/fournisseurs/add}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-2"></i>Nouveau fournisseur
        </a>
    </div>
    
    <!-- Filtres -->
    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/fournisseurs}" method="get" class="row g-3">
                <div class="col-md-5">
                    <input type="text" class="form-control" name="search" th:value="${search}" placeholder="Rechercher (code, raison sociale, contact...)">
                </div>
                <div class="col-md-2">
                    <select class="form-select" name="actif">
                        <option value="">Tous</option>
                        <option value="true" th:selected="${actif == true}">Actifs</option>
                        <option value="false" th:selected="${actif == false}">Inactifs</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-outline-primary me-2">
                        <i class="bi bi-search me-1"></i>Filtrer
                    </button>
                    <a th:href="@{/fournisseurs}" class="btn btn-outline-secondary">Réinitialiser</a>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Liste des fournisseurs -->
    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Code</th>
                            <th>Nom</th>
                            <th>Email</th>
                            <th>Téléphone</th>
                            <th>Adresse</th>
                            <th class="text-center">État</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="fournisseur : ${fournisseurs}">
                            <td><code th:text="${fournisseur.code}"></code></td>
                            <td>
                                <a th:href="@{/fournisseurs/{id}(id=${fournisseur.id})}" th:text="${fournisseur.name}"></a>
                            </td>
                            <td th:text="${fournisseur.email}"></td>
                            <td th:text="${fournisseur.telephone}"></td>
                            <td><small class="text-muted" th:text="${fournisseur.adresse}"></small></td>
                            <td class="text-center">
                                <span th:if="${fournisseur.isActive}" class="badge bg-success">Actif</span>
                                <span th:unless="${fournisseur.isActive}" class="badge bg-secondary">Inactif</span>
                            </td>
                            <td>
                                <div class="btn-group btn-group-sm">
                                    <a th:href="@{/fournisseurs/{id}(id=${fournisseur.id})}" class="btn btn-outline-primary" title="Voir">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                    <a th:href="@{/fournisseurs/edit/{id}(id=${fournisseur.id})}" class="btn btn-outline-secondary" title="Modifier">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <a th:href="@{/achats/demandes/add(fournisseurId=${fournisseur.id})}" class="btn btn-outline-success" title="Créer demande">
                                        <i class="bi bi-cart-plus"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(fournisseurs)}">
                            <td colspan="7" class="text-center text-muted py-4">
                                <i class="bi bi-truck fs-1 d-block mb-2"></i>
                                Aucun fournisseur trouvé
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
