<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Livraisons</title>
</head>
<body>
<div layout:fragment="content">
    <div class="page-header d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1>Bons de livraison</h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/dashboard}">Accueil</a></li>
                    <li class="breadcrumb-item active">Livraisons</li>
                </ol>
            </nav>
        </div>
    </div>
    
    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Numéro BL</th>
                            <th>Date expédition</th>
                            <th>Commande</th>
                            <th>Client</th>
                            <th>Statut</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="livraison : ${livraisons.content}">
                            <td>
                                <a th:href="@{/ventes/livraisons/{id}(id=${livraison.id})}" th:text="${livraison.numero}"></a>
                            </td>
                            <td th:text="${#temporals.format(livraison.dateExpedition, 'dd/MM/yyyy')}"></td>
                            <td th:text="${livraison.commande?.numero}"></td>
                            <td th:text="${livraison.commande?.client?.name}"></td>
                            <td>
                                <span class="badge badge-status" 
                                      th:classappend="'badge-' + ${livraison.statutCode?.toLowerCase()}"
                                      th:text="${livraison.statutCode}"></span>
                            </td>
                            <td>
                                <div class="btn-group btn-group-sm">
                                    <a th:href="@{/ventes/livraisons/{id}(id=${livraison.id})}" class="btn btn-outline-primary" title="Voir">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${livraisons.content.isEmpty()}">
                            <td colspan="6" class="text-center text-muted py-4">
                                <i class="bi bi-truck fs-1 d-block mb-2"></i>
                                Aucune livraison
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
