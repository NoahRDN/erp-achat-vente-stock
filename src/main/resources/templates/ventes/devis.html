<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Devis</title>
</head>
<body>
<div layout:fragment="content">
    <div class="page-header d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1>Devis clients</h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/dashboard}">Accueil</a></li>
                    <li class="breadcrumb-item active">Devis</li>
                </ol>
            </nav>
        </div>
        <a th:href="@{/ventes/devis/add}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-2"></i>Nouveau devis
        </a>
    </div>
    
    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Numéro</th>
                            <th>Date</th>
                            <th>Client</th>
                            <th>Validité</th>
                            <th>Total TTC</th>
                            <th>Statut</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="d : ${devis.content}">
                            <td>
                                <a th:href="@{/ventes/devis/{id}(id=${d.id})}" th:text="${d.numero}"></a>
                            </td>
                            <td th:text="${#temporals.format(d.createdAt, 'dd/MM/yyyy')}"></td>
                            <td th:text="${d.client?.name}"></td>
                            <td th:text="${d.dateValidite != null ? #temporals.format(d.dateValidite, 'dd/MM/yyyy') : '-'}"></td>
                            <td th:text="${#numbers.formatDecimal(d.totalTTC, 0, 'COMMA', 0, 'POINT')} + ' MGA'"></td>
                            <td>
                                <span class="badge badge-status" 
                                      th:classappend="'badge-' + ${d.statutCode?.toLowerCase()}"
                                      th:text="${d.statutCode}"></span>
                            </td>
                            <td>
                                <div class="btn-group btn-group-sm">
                                    <a th:href="@{/ventes/devis/{id}(id=${d.id})}" class="btn btn-outline-primary" title="Voir">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${devis.content.isEmpty()}">
                            <td colspan="7" class="text-center text-muted py-4">
                                <i class="bi bi-file-earmark-ruled fs-1 d-block mb-2"></i>
                                Aucun devis
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
