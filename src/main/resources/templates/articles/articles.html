<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Articles</title>
</head>
<body>
<div layout:fragment="content">
    <div class="page-header d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1>Catalogue Articles</h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/dashboard}">Accueil</a></li>
                    <li class="breadcrumb-item active">Articles</li>
                </ol>
            </nav>
        </div>
        <a th:href="@{/articles/add}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-2"></i>Nouvel article
        </a>
    </div>
    
    <!-- Filtres -->
    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/articles}" method="get" class="row g-3">
                <div class="col-md-4">
                    <input type="text" class="form-control" name="search" th:value="${search}" placeholder="Rechercher (SKU, désignation...)">
                </div>
                <div class="col-md-3">
                    <select class="form-select" name="famille">
                        <option value="">Toutes les familles</option>
                        <option th:each="famille : ${familles}" th:value="${famille.id}" th:text="${famille.name}" th:selected="${famille.id == familleId}"></option>
                    </select>
                </div>
                <div class="col-md-2">
                    <select class="form-select" name="actif">
                        <option value="">Tous</option>
                        <option value="true" th:selected="${actif == true}">Actifs</option>
                        <option value="false" th:selected="${actif == false}">Inactifs</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-outline-primary me-2">
                        <i class="bi bi-search me-1"></i>Filtrer
                    </button>
                    <a th:href="@{/articles}" class="btn btn-outline-secondary">Réinitialiser</a>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Liste des articles -->
    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>SKU</th>
                            <th>Désignation</th>
                            <th>Famille</th>
                            <th>Unité</th>
                            <th>Poids</th>
                            <th class="text-center">État</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="article : ${articles}">
                            <td><code th:text="${article.sku}"></code></td>
                            <td>
                                <a th:href="@{/articles/{id}(id=${article.id})}" th:text="${article.label}"></a>
                                <small class="d-block text-muted" th:if="${article.famille?.isLotObligatoire}">
                                    <i class="bi bi-boxes me-1"></i>Géré par lot
                                </small>
                            </td>
                            <td th:text="${article.famille?.name}"></td>
                            <td th:text="${article.unite?.label}"></td>
                            <td th:text="${article.weight != null ? article.weight + ' kg' : '-'}"></td>
                            <td class="text-center">
                                <span th:if="${article.isActive}" class="badge bg-success">Actif</span>
                                <span th:unless="${article.isActive}" class="badge bg-secondary">Inactif</span>
                            </td>
                            <td>
                                <div class="btn-group btn-group-sm">
                                    <a th:href="@{/articles/{id}(id=${article.id})}" class="btn btn-outline-primary" title="Voir">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                    <a th:href="@{/articles/edit/{id}(id=${article.id})}" class="btn btn-outline-secondary" title="Modifier">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(articles)}">
                            <td colspan="7" class="text-center text-muted py-4">
                                <i class="bi bi-box-seam fs-1 d-block mb-2"></i>
                                Aucun article trouvé
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <!-- Pagination -->
            <nav th:if="${articles.totalPages > 1}" class="mt-4">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${articles.first} ? 'disabled'">
                        <a class="page-link" th:href="@{/articles(page=${articles.number - 1}, search=${search})}">Précédent</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, T(java.lang.Math).min(articles.totalPages - 1, 9))}"
                        th:classappend="${i == articles.number} ? 'active'">
                        <a class="page-link" th:href="@{/articles(page=${i}, search=${search})}" th:text="${i + 1}"></a>
                    </li>
                    <li class="page-item" th:classappend="${articles.last} ? 'disabled'">
                        <a class="page-link" th:href="@{/articles(page=${articles.number + 1}, search=${search})}">Suivant</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>
</body>
</html>
