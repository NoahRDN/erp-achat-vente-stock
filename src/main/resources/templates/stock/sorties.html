<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Sorties de stock</title>
</head>
<body>
<div layout:fragment="content">
    <div class="page-header d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1>Sorties de stock (Consommation & Rebut)</h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/dashboard}">Accueil</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/stock}">Stock</a></li>
                    <li class="breadcrumb-item active">Sorties</li>
                </ol>
            </nav>
        </div>
        <div class="btn-group">
            <a th:href="@{/stock/sorties/add(type='CONSOMMATION')}" class="btn btn-primary">
                <i class="bi bi-box-arrow-right me-2"></i>Consommation interne
            </a>
            <a th:href="@{/stock/sorties/add(type='REBUT')}" class="btn btn-danger">
                <i class="bi bi-trash me-2"></i>Mise au rebut
            </a>
        </div>
    </div>
    
    <!-- Filtres -->
    <div class="card mb-3">
        <div class="card-body">
            <div class="btn-group" role="group">
                <a th:href="@{/stock/sorties}" 
                   class="btn btn-sm"
                   th:classappend="${typeFiltre == null ? 'btn-primary' : 'btn-outline-primary'}">
                    Tout
                </a>
                <a th:href="@{/stock/sorties(type='CONSOMMATION')}" 
                   class="btn btn-sm"
                   th:classappend="${typeFiltre == 'CONSOMMATION' ? 'btn-primary' : 'btn-outline-primary'}">
                    Consommation
                </a>
                <a th:href="@{/stock/sorties(type='REBUT')}" 
                   class="btn btn-sm"
                   th:classappend="${typeFiltre == 'REBUT' ? 'btn-danger' : 'btn-outline-danger'}">
                    Rebut
                </a>
            </div>
        </div>
    </div>
    
    <!-- Statistiques -->
    <div class="row mb-4">
        <div class="col-md-6">
            <div class="card bg-primary bg-opacity-10">
                <div class="card-body">
                    <h6 class="text-muted">Consommations en attente</h6>
                    <h3 th:text="${consommationEnAttente}">0</h3>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card bg-danger bg-opacity-10">
                <div class="card-body">
                    <h6 class="text-muted">Rebuts en attente</h6>
                    <h3 th:text="${rebutEnAttente}">0</h3>
                </div>
            </div>
        </div>
    </div>
    
    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Numéro</th>
                            <th>Date</th>
                            <th>Type</th>
                            <th>Motif</th>
                            <th>Dépôt</th>
                            <th>Demandeur</th>
                            <th>Coût total</th>
                            <th>Statut</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="sortie : ${sorties.content}">
                            <td>
                                <a th:href="@{/stock/sorties/{id}(id=${sortie.id})}" 
                                   th:text="${sortie.numero}"
                                   class="fw-bold"></a>
                            </td>
                            <td th:text="${#temporals.format(sortie.dateDemande, 'dd/MM/yyyy')}"></td>
                            <td>
                                <span class="badge" 
                                      th:classappend="${sortie.type == 'CONSOMMATION' ? 'bg-primary' : 'bg-danger'}"
                                      th:text="${sortie.type}"></span>
                            </td>
                            <td th:text="${sortie.motifCode}"></td>
                            <td th:text="${sortie.depot?.name}"></td>
                            <td th:text="${sortie.demandeur?.username}"></td>
                            <td th:text="${sortie.coutTotal != null ? #numbers.formatDecimal(sortie.coutTotal, 0, 'COMMA', 0, 'POINT') + ' MGA' : '-'}"></td>
                            <td>
                                <span class="badge" 
                                      th:classappend="${sortie.statutCode == 'BROUILLON' ? 'bg-secondary' : 
                                                       sortie.statutCode == 'SOUMISE' ? 'bg-warning' : 
                                                       sortie.statutCode == 'APPROUVEE' ? 'bg-info' :
                                                       sortie.statutCode == 'EXECUTEE' ? 'bg-success' : 'bg-danger'}"
                                      th:text="${sortie.statutCode}"></span>
                            </td>
                            <td>
                                <a th:href="@{/stock/sorties/{id}(id=${sortie.id})}" 
                                   class="btn btn-sm btn-outline-primary">
                                    <i class="bi bi-eye"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${sorties.content.empty}">
                            <td colspan="9" class="text-center text-muted py-4">
                                <i class="bi bi-inbox display-4"></i>
                                <p class="mt-2">Aucune sortie de stock</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
