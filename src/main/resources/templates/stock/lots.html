<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Lots</title>
</head>
<body>
<div layout:fragment="content">
    <div class="page-header d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 th:text="${titre != null ? titre : 'Gestion des lots'}">Gestion des lots</h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/dashboard}">Accueil</a></li>
                    <li class="breadcrumb-item active">Lots</li>
                </ol>
            </nav>
        </div>
        <div class="btn-group">
            <a th:href="@{/stock/lots}" class="btn btn-outline-secondary">Tous</a>
            <a th:href="@{/stock/lots/expirant}" class="btn btn-outline-warning">Expirant bientôt</a>
            <a th:href="@{/stock/lots/perimes}" class="btn btn-outline-danger">Périmés</a>
        </div>
    </div>
    
    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>N° Lot</th>
                            <th>Article</th>
                            <th>Date fabrication</th>
                            <th>Date expiration</th>
                            <th>Fournisseur</th>
                            <th>Statut QC</th>
                            <th>État</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="lot : ${lots}"
                            th:classappend="${lot.datePeremption != null and lot.datePeremption.isBefore(T(java.time.LocalDate).now())} ? 'table-danger' : 
                                           (${lot.datePeremption != null and lot.datePeremption.isBefore(T(java.time.LocalDate).now().plusDays(30))} ? 'table-warning' : '')">
                            <td><code th:text="${lot.numeroLot}"></code></td>
                            <td th:text="${lot.article?.label}"></td>
                            <td th:text="${lot.dateFabrication != null ? #temporals.format(lot.dateFabrication, 'dd/MM/yyyy') : '-'}"></td>
                            <td th:text="${lot.datePeremption != null ? #temporals.format(lot.datePeremption, 'dd/MM/yyyy') : '-'}"></td>
                            <td>-</td>
                            <td>
                                <span class="badge" th:classappend="${lot.statutQualiteCode == 'CONFORME'} ? 'bg-success' : 
                                                                   (${lot.statutQualiteCode == 'REJETE'} ? 'bg-danger' : 'bg-secondary')"
                                      th:text="${lot.statutQualiteCode}"></span>
                            </td>
                            <td>
                                <span th:if="${lot.datePeremption != null and lot.datePeremption.isBefore(T(java.time.LocalDate).now())}" 
                                      class="badge bg-danger">Périmé</span>
                                <span th:if="${lot.datePeremption != null and lot.datePeremption.isAfter(T(java.time.LocalDate).now()) and lot.datePeremption.isBefore(T(java.time.LocalDate).now().plusDays(30))}" 
                                      class="badge bg-warning">Expire bientôt</span>
                                <span th:if="${lot.datePeremption == null or lot.datePeremption.isAfter(T(java.time.LocalDate).now().plusDays(30))}" 
                                      class="badge bg-success">Valide</span>
                            </td>
                            <td>
                                <button class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" data-bs-target="#controleModal"
                                        th:data-lot-id="${lot.id}">
                                    <i class="bi bi-clipboard-check"></i> Contrôle QC
                                </button>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(lots)}">
                            <td colspan="8" class="text-center text-muted py-4">
                                <i class="bi bi-upc-scan fs-1 d-block mb-2"></i>
                                Aucun lot
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <!-- Modal Contrôle QC -->
    <div class="modal fade" id="controleModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form th:action="@{/stock/lots/controle-qc}" method="post">
                    <div class="modal-header">
                        <h5 class="modal-title">Contrôle qualité</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" name="lotId" id="lotIdInput">
                        
                        <div class="mb-3">
                            <label class="form-label">Résultat du contrôle <span class="text-danger">*</span></label>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="conforme" value="true" id="conforme" required>
                                <label class="form-check-label text-success" for="conforme">
                                    <i class="bi bi-check-circle"></i> Conforme - Accepté
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="conforme" value="false" id="nonConforme" required>
                                <label class="form-check-label text-danger" for="nonConforme">
                                    <i class="bi bi-x-circle"></i> Non conforme - Rejeté
                                </label>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="notes" class="form-label">Observations</label>
                            <textarea class="form-control" name="notes" id="notes" rows="3" placeholder="Notes sur le contrôle qualité..."></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                        <button type="submit" class="btn btn-primary">Valider le contrôle</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script>
        // Récupérer l'ID du lot lors de l'ouverture de la modal
        document.getElementById('controleModal').addEventListener('show.bs.modal', function (event) {
            const button = event.relatedTarget;
            const lotId = button.getAttribute('data-lot-id');
            document.getElementById('lotIdInput').value = lotId;
        });
    </script>
</div>
</body>
</html>
